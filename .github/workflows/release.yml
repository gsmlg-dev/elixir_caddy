name: release
on:
  workflow_dispatch:
    inputs:
      release-version:
        required: true
        description: 'The version of the release (e.g. 2.3.2)'
        default: '2.0.0'
      git-ref:
        required: true
        description: 'The git revision of repo, branch, tag or commit'
        default: 'main'

permissions:
  contents: write

jobs:
  release:
    name: Publish release to hex.pm
    runs-on: ubuntu-latest
    env:
      MIX_ENV: docs
    steps:
      - name: 🛑 Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.git-ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: 27
          elixir-version: 1.18

      - name: Install Deps
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix deps.get

      - name: Update version in mix.exs and README.md
        run: |
          sed -i 's%@version "[0-9\.]\+"%@version "${{ github.event.inputs.release-version }}"%' mix.exs
          sed -i 's%{:caddy, "~> [0-9\.]\+"}%{:caddy, "~> ${{ github.event.inputs.release-version }}"}%' README.md

      - name: Publish to hex.pm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix publish

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mix.exs README.md
          git commit -m "chore(release): bump version to ${{ github.event.inputs.release-version }}"
          git push origin HEAD:${{ github.event.inputs.git-ref }}

      - name: Create tag
        run: |
          git tag "v${{ github.event.inputs.release-version }}"
          git push origin "v${{ github.event.inputs.release-version }}"

      - name: Create GitHub Release with generated notes
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ github.event.inputs.release-version }}`,
              name: `v${{ github.event.inputs.release-version }}`,
              generate_release_notes: true,
              draft: false,
              prerelease: false
            })
