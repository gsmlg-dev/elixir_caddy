name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        description: 'Release version (e.g. 1.2.3)'
      git_ref:
        required: true
        description: 'Git ref to release from'
        default: 'main'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Publish release to hex.pm
    runs-on: ubuntu-latest
    env:
      MIX_ENV: docs

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          elixir-version: '1.18'

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix deps.get

      - name: Update version in mix.exs and README.md
        run: |
          sed -i 's%@version "[0-9\.]\+"%@version "${{ inputs.version }}"%' mix.exs
          sed -i 's%{:caddy, "~> [0-9\.]\+"}%{:caddy, "~> ${{ inputs.version }}"}%' README.md

      - name: Publish to hex.pm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix publish

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mix.exs README.md
          git commit -m "chore(release): bump version to ${{ inputs.version }}"
          git push origin HEAD:${{ inputs.git_ref }}

      - name: Create and push tag
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub Release with generated notes
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ inputs.version }}`,
              name: `v${{ inputs.version }}`,
              generate_release_notes: true,
              draft: false,
              prerelease: false
            })
